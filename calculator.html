<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>iPhone Style Calculator</title><style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: black;
    font-family: Arial;
}

.calculator {
    width: 300px;
    background: black;
    padding: 20px;
    border-radius: 20px;
}

/* DISPLAY */
#display {
    width: 100%;
    height: 80px;
    font-size: 40px;
    text-align: right;
    border: none;
    background: black;
    color: white;
    margin-bottom: 20px;
}

/* BUTTON GRID */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

/* COMMON BUTTON */
button {
    height: 65px;
    border-radius: 50%;
    border: none;
    font-size: 20px;
    cursor: pointer;
}

/* COLORS */
.gray {
    background: #a5a5a5;
    color: black;
}

.dark {
    background: #333;
    color: white;
}

.orange {
    background: #ff9500;
    color: white;
}

/* ZERO BUTTON */
.zero {
    grid-column: span 2;
    border-radius: 40px;
    text-align: left;
    padding-left: 25px;
}

/* HISTORY PANEL */
.history-panel {
    position: absolute;
    right: -220px;
    top: 20px;
    width: 200px;
    height: 300px;
    background: #111;
    color: white;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
    transition: 0.3s;
}

.history-panel.show {
    right: -10px;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style></head>
<body><div class="calculator"><!-- TOP BAR -->
<div class="top-bar">
    <span onclick="toggleHistory()">⏱️</span>
    <span onclick="clearHistory()">🗑️</span>
</div>

<input type="text" id="display" disabled>

<div class="buttons">
    <button class="gray" onclick="clearDisplay()">AC</button>
    <button class="gray" onclick="deleteLast()">⌫</button>
    <button class="gray" onclick="appendValue('%')">%</button>
    <button class="orange" onclick="appendValue('/')">÷</button>

    <button class="dark" onclick="appendValue('7')">7</button>
    <button class="dark" onclick="appendValue('8')">8</button>
    <button class="dark" onclick="appendValue('9')">9</button>
    <button class="orange" onclick="appendValue('*')">×</button>

    <button class="dark" onclick="appendValue('4')">4</button>
    <button class="dark" onclick="appendValue('5')">5</button>
    <button class="dark" onclick="appendValue('6')">6</button>
    <button class="orange" onclick="appendValue('-')">−</button>

    <button class="dark" onclick="appendValue('1')">1</button>
    <button class="dark" onclick="appendValue('2')">2</button>
    <button class="dark" onclick="appendValue('3')">3</button>
    <button class="orange" onclick="appendValue('+')">+</button>

    <button class="dark zero" onclick="appendValue('0')">0</button>
    <button class="dark" onclick="appendValue('.')">.</button>
    <button class="orange" onclick="calculate()">=</button>
</div>

<!-- HISTORY -->
<div class="history-panel" id="history"></div>

</div><script>
let display = document.getElementById("display");
let historyPanel = document.getElementById("history");

// INPUT
function appendValue(val) {
    display.value += val;
}

// CLEAR
function clearDisplay() {
    display.value = "";
}

// DELETE
function deleteLast() {
    display.value = display.value.slice(0, -1);
}

// CALCULATE
function calculate() {
    try {
        let exp = display.value;
        let result = eval(exp);
        display.value = result;

        let item = document.createElement("div");
        item.textContent = exp + " = " + result;
        historyPanel.appendChild(item);

    } catch {
        display.value = "Error";
    }
}

// HISTORY TOGGLE
function toggleHistory() {
    historyPanel.classList.toggle("show");
}

// CLEAR HISTORY
function clearHistory() {
    historyPanel.innerHTML = "";
}
</script></body>
</html>
